# ConnectEd — LiveKit stack (LiveKit server + Egress recorder + Redis)
#
# Usage:
#   docker compose up -d
#
# Recordings land in:  backend/uploads/recordings/
# Backend webhook at:  http://host.docker.internal:8000/api/v1/video/webhook

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"   # WebSocket / HTTP
      - "7881:7881"   # RTC TCP
      - "7882:7882/udp" # RTC UDP
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    depends_on:
      - redis

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    privileged: true            # required for Chrome sandbox inside container
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml
      - ./backend/uploads/recordings:/tmp/recordings
    depends_on:
      - redis
      - livekit
